<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alessia Santambrogio — Blog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --text: #111;
      --muted: #666;
      --light: #999;
      --border: #e8e8e5;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body.dark {
      --bg: #0f0f0f;
      --text: #f0f0f0;
      --muted: #999;
      --light: #666;
      --border: #2a2a2a;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    a { text-decoration: none; color: inherit; }

    .page {
      max-width: 860px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }

    /* ── NAV ── */
    .nav {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 52px;
    }
    .nav-links { display: flex; gap: 32px; flex: 1; }
    .nav a { font-size: 14px; color: var(--muted); font-weight: 500; }
    .nav a:hover { color: #4a7fc1; }
    .nav a.active { color: var(--text); }
    .theme-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--muted); display: flex; align-items: center; padding: 4px;
    }
    .theme-toggle:hover { color: var(--text); }
    .theme-toggle svg { width: 18px; height: 18px; fill: currentColor; }
    .icon-sun, .icon-moon { display: none; }
    body.light .icon-sun { display: block; }
    body.dark .icon-moon { display: block; }

    /* ── COMING SOON ── */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      gap: 12px;
    }
    .coming-soon h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .coming-soon p {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: var(--light);
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="research.html">Research</a>
      <a href="blog.html" class="active">Blog</a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
      <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85 1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
  </div>
</nav>

<div class="page">
  <div class="coming-soon">
    <h1>Coming Soon</h1>
    <p>I'm working on something. Check back later.</p>
  </div>
  <div class="footer">© 2026 Alessia Santambrogio. All rights reserved.</div>
</div>

<script>
  const saved = localStorage.getItem('theme') || 'light';
  document.body.classList.add(saved);
  function toggleTheme() {
    const isDark = document.body.classList.contains('dark');
    document.body.classList.toggle('dark', !isDark);
    document.body.classList.toggle('light', isDark);
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  }
</script>
</body>
</html>
